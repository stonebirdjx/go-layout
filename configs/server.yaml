# log相关配置
log:
  # 日志级别，可选值：debug, info, warn, error 
  level: "debug"
  # 日志输出格式，可选值：json, console
  format: "json"
  # 日志文件路径，为空则只输出到 stdout
  file_path: "logs/server.log"
  # 单个日志文件最大大小（MB）
  max_size: 100
  # 保留旧日志文件最大数量，0 表示不限制
  max_backups: 5
  # 保留旧日志文件最大天数，0 表示不限制
  max_age: 30
  # 是否压缩旧日志文件
  compress: true
